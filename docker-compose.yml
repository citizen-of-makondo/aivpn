services:
  # AIVPN Server
  aivpn-server:
    image: aivpn-server:latest
    build:
      context: .
      dockerfile: ${AIVPN_SERVER_DOCKERFILE:-Dockerfile}
    restart: unless-stopped
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    tmpfs:
      - /run:mode=1777,size=64M
      - /tmp:mode=1777,size=128M
    mem_limit: 800m
    memswap_limit: 800m
    cpu_shares: 512
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      - AIVPN_STATS_FLUSH_INTERVAL_SECS=${AIVPN_STATS_FLUSH_INTERVAL_SECS:-10}
    volumes:
      - ./config:/etc/aivpn
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    labels:
      - "com.aivpn.service=gateway"
      - "com.aivpn.version=0.3.0"

  # Prometheus (optional monitoring)
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - aivpn
    profiles:
      - monitoring

  # Grafana (optional visualization)
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - aivpn
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:

networks:
  aivpn:
    driver: bridge
